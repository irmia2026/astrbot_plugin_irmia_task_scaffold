# irmia_task_scaffold 配置文件
# 位置: ~/.astrbot/data/task_scaffolds/config.yaml
# 缺失时使用默认值，无需手动创建

# ---- 路径 ----
# data_root: "~/.astrbot/data/task_scaffolds"  # 数据根目录，默认 ~/.astrbot/data/task_scaffolds

# ---- 上下文 ----
context_limit: 200000         # 默认上下文上限（首次 LLM 响应后自动从 provider 获取真实值）

# ---- 日志裁剪 ----
activity_max_lines: 200       # activity.jsonl 最大行数
summary_max_lines: 100        # summary.jsonl 最大行数
tokens_max_lines: 500         # tokens.jsonl 最大行数

# ---- 行为 ----
recent_summary_count: 5       # status 空闲时返回的最近归档数
archive_list_limit: 50        # 归档列表每页最大条目数
ws_summary_max_chars: 240     # 自动注入 prompt 时每个工作区文件摘要最大字符数

# ---- 扩展 ----
# extra_write_keywords: []    # 额外的写工具关键词（追加到内置列表）
# extra_exempt_tools: []      # 额外的豁免工具名
