<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任务工作台 · irmia_task_scaffold</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f8fc; --surface: #ffffff; --border: #e2e8f0;
  --text: #1e293b; --text2: #64748b; --muted: #94a3b8;
  --blue: #3b82f6; --blue-light: #eff6ff; --emerald: #10b981; --emerald-light: #ecfdf5;
  --amber: #f59e0b; --amber-light: #fffbeb; --rose: #f43f5e; --rose-light: #fff1f2;
  --violet: #8b5cf6; --violet-light: #f5f3ff;
  --nav-w: 220px; --file-w: 300px;
  --font: 'Outfit','Noto Sans SC',sans-serif;
  --spring: cubic-bezier(.34,1.56,.64,1); --ease: cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 0% 30%,rgba(59,130,246,.04)0%,transparent 55%),
             radial-gradient(ellipse at 100% 70%,rgba(139,92,246,.03)0%,transparent 55%);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,rgba(59,130,246,.04) 1px,transparent 1px);
  background-size:24px 24px;}
#app{display:flex;height:100vh;padding:8px;gap:8px;position:relative;z-index:1}

#nav-col{width:var(--nav-w);flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.nav-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.nav-panel-header{padding:10px 14px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .1s;border-left:3px solid transparent}
.nav-item:hover{background:var(--blue-light);color:var(--blue)}
.nav-item.active{background:var(--blue-light);color:var(--blue);font-weight:600;border-left-color:var(--blue)}
.nav-item .badge{font-size:10px;padding:1px 6px;border-radius:8px;background:var(--blue-light);color:var(--blue);font-weight:700;margin-left:auto}
.nav-item.active .badge{background:var(--blue);color:#fff}
.nav-status{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:11px;color:var(--text2)}
.nav-status .sdot{width:7px;height:7px;border-radius:50%;background:var(--emerald);box-shadow:0 0 0 3px var(--emerald-light);animation:dotLive 2s infinite}
@keyframes dotLive{0%,100%{opacity:1}50%{opacity:.4}}

#center-col{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.panel-header{padding:8px 14px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.panel-body{flex:1;overflow-y:auto;min-height:0}
#task-panel{flex:2}
#live-panel{flex:1}

.task-hero{padding:18px 22px}
.task-hero-title{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-bottom:3px}
.task-hero-meta{font-size:11px;color:var(--text2)}
.task-hero-tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.task-hero-tag{font-size:10px;padding:2px 9px;border-radius:12px;background:var(--blue-light);color:var(--blue);font-weight:500}

.progress-row{display:flex;align-items:center;gap:20px;padding:16px 22px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.progress-ring{position:relative;width:64px;height:64px;flex-shrink:0}
.progress-ring svg{width:64px;height:64px;transform:rotate(-90deg)}
.progress-ring .bg{fill:none;stroke:var(--border);stroke-width:5}
.progress-ring .fill{fill:none;stroke:var(--blue);stroke-width:5;stroke-linecap:round}
.progress-ring .pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:16px;font-weight:800;font-feature-settings:'tnum'}
.progress-stats{display:flex;flex-direction:column;gap:3px}
.progress-stat{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px}
.progress-stat b{color:var(--text);font-weight:700;font-feature-settings:'tnum'}
.progress-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.progress-dot.active{background:var(--blue);box-shadow:0 0 0 3px var(--blue-light)}
.progress-dot.done{background:var(--emerald)}
.progress-dot.waiting{background:var(--border)}

.todo-list{padding:4px 0}
.todo-item{display:flex;align-items:center;gap:8px;padding:6px 22px;transition:background .1s}
.todo-item:hover{background:#f8fafc}
.todo-num{width:19px;height:19px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-feature-settings:'tnum';flex-shrink:0}
.todo-num.done{background:var(--emerald-light);color:var(--emerald)}
.todo-num.cancelled{background:#f1f5f9;color:var(--muted)}
.todo-num.active{background:var(--blue);color:#fff}
.todo-num.waiting{background:#f1f5f9;color:var(--muted)}
.todo-text{flex:1;font-size:12px}
.todo-text.done{color:var(--muted);text-decoration:line-through}
.todo-pill{font-size:8px;padding:2px 6px;border-radius:4px;font-weight:600;letter-spacing:.2px;text-transform:uppercase;flex-shrink:0}
.todo-pill.high{background:var(--rose-light);color:var(--rose)}
.todo-pill.medium{background:var(--amber-light);color:var(--amber)}
.todo-pill.low{background:#f1f5f9;color:var(--muted)}

.live-header-row{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border)}
.live-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--emerald);box-shadow:0 0 0 3px var(--emerald-light);animation:dotLive 2s infinite}
.live-body{padding:2px 0}
.live-row{display:flex;align-items:flex-start;gap:7px;padding:4px 14px;font-size:11px;border-bottom:1px solid rgba(226,232,240,.4);animation:liveIn .3s var(--ease)}
@keyframes liveIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.live-row .lr-ts{color:var(--muted);font-size:9px;font-family:Consolas,monospace;white-space:nowrap;min-width:46px;padding-top:1px}
.live-row .lr-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px}
.live-row .lr-dot.think{background:var(--blue)}
.live-row .lr-dot.exec{background:var(--amber)}
.live-row .lr-dot.reply{background:var(--emerald)}
.live-row .lr-dot.read{background:var(--violet)}
.live-row .lr-body{flex:1;min-width:0;line-height:1.4}
.live-row .lr-agent{font-weight:600;font-size:10px}
.live-row .lr-detail{color:var(--text2)}

#file-col{width:var(--file-w);flex-shrink:0;display:flex;flex-direction:column;gap:6px;min-width:0}
.file-nav-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;flex-shrink:0}
.file-nav-header{padding:10px 14px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.file-nav-item{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .1s;border-left:3px solid transparent}
.file-nav-item:hover{background:var(--blue-light);color:var(--blue)}
.file-nav-item.active{background:var(--blue-light);color:var(--blue);font-weight:600;border-left-color:var(--blue)}
.file-preview-panel{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.file-preview-header{padding:8px 14px;font-size:10px;font-weight:700;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.file-preview-body{flex:1;overflow-y:auto;padding:12px 14px;font-family:'JetBrains Mono','Consolas',monospace;font-size:10px;line-height:1.6;white-space:pre-wrap;color:#475569}

.archive-wrap{padding:12px 18px}
.archive-search{width:100%;padding:7px 12px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:var(--font);background:var(--surface);margin-bottom:12px}
.archive-search:focus{outline:none;border-color:var(--blue)}
.arc-group{margin-bottom:3px}
.arc-group-head{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-radius:7px;transition:background .1s}
.arc-group-head:hover{background:#f8fafc}
.arc-group-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--blue-light)}
.arc-group-name{font-size:13px;font-weight:600}
.arc-group-count{font-size:10px;color:var(--text2)}
.arc-group-arr{font-size:8px;color:var(--muted);transition:transform .25s var(--spring);margin-left:auto}
.arc-group.open .arc-group-arr{transform:rotate(90deg)}
.arc-items{display:none;padding:1px 0 1px 10px}
.arc-group.open .arc-items{display:block}
.arc-item{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:10px 14px;margin-bottom:3px;cursor:pointer;transition:all .1s;font-size:12px}
.arc-item:hover{border-color:var(--blue)}
.arc-item-head{display:flex;align-items:center;justify-content:space-between}
.arc-item-title{font-size:12px;font-weight:600}
.arc-item-meta{font-size:10px;color:var(--text2);margin-top:1px}
.arc-item-badge{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600}
.arc-item-badge.done{background:var(--emerald-light);color:var(--emerald)}
.arc-item-badge.partial{background:var(--amber-light);color:var(--amber)}
.arc-item-detail{display:none;padding-top:8px;margin-top:6px;border-top:1px solid var(--border);font-size:11px}
.arc-item.open .arc-item-detail{display:block}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.empty-state{text-align:center;padding:32px 16px;color:var(--muted)}
.empty-state .e-icon{font-size:22px;display:block;margin-bottom:6px;opacity:.5}
.empty-state h4{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.empty-state p{font-size:10px}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes todoDone{0%{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes pctBounce{0%{transform:translate(-50%,-50%) scale(.6);opacity:0}60%{transform:translate(-50%,-48%) scale(1.08)}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px);max-height:0}to{opacity:1;transform:translateX(0);max-height:40px}}
.pct.anim{animation:pctBounce .5s var(--spring)}
.todo-item.done{animation:todoDone .35s var(--ease)}
.panel.fade{animation:fadeIn .25s var(--ease)}
.file-preview-body.fade{animation:fadeIn .2s var(--ease)}
.live-row.slide-in{animation:slideIn .3s var(--ease)}
.skeleton{background:linear-gradient(90deg,var(--border) 25%,#f0ece6 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
.skel-bar{height:14px;margin-bottom:8px;border-radius:6px}
.skel-circle{width:48px;height:48px;border-radius:50%}
.skel-hero{display:flex;gap:16px;padding:18px 22px}
.skel-hero .skel-bar:nth-child(1){width:60%}
.skel-hero .skel-bar:nth-child(2){width:35%}

.empty-house{width:28px;height:26px;position:relative;border-bottom:2.5px solid var(--muted);margin:0 auto 8px;opacity:.35}
.empty-house::before{content:'';position:absolute;top:-12px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-bottom:14px solid var(--muted)}
.empty-box{width:24px;height:20px;border:2.5px solid var(--muted);border-radius:3px;margin:0 auto 8px;opacity:.35;position:relative}
.empty-box::after{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:10px;height:6px;border:2.5px solid var(--muted);border-bottom:none;border-radius:2px 2px 0 0}

@media(max-width:900px){#file-col{display:none}}
@media(max-width:640px){#nav-col{width:160px}}
</style>
</head>
<body>
<div id="app">

<div id="nav-col">
  <div class="nav-panel" style="flex-shrink:0">
    <div class="nav-panel-header">任务导航</div>
    <div class="nav-item active" id="nav-current" onclick="switchView('current')">当前任务</div>
    <div class="nav-item" id="nav-archive" onclick="switchView('archive')">归档 <span class="badge" id="archive-badge">0</span></div>
  </div>
  <div class="nav-panel" style="flex:1;min-height:0;display:flex;flex-direction:column">
    <div class="nav-panel-header">归档分类</div>
    <div class="panel-body" id="tag-cats">
      <div class="nav-item active" style="font-size:12px" onclick="filterArchiveCat('all')">全部</div>
    </div>
  </div>
  <div class="nav-panel" style="flex-shrink:0">
    <div class="nav-status"><span class="sdot"></span> AstrBot 在线 <span id="nav-time"></span></div>
  </div>
</div>

<div id="center-col">
  <div class="panel" id="task-panel">
    <div class="panel-header" id="task-header">当前任务</div>
    <div class="panel-body" id="task-body">
      <div class="empty-state"><span class="e-icon"></span><h4>无活跃任务</h4><p>对 Agent 说要做什么即可</p></div>
    </div>
  </div>
  <div class="panel" id="live-panel">
    <div class="live-header-row"><span class="live-title">实时活动</span><span class="live-dot"></span></div>
    <div class="panel-body" id="live-body"><div class="empty-state"><div class="empty-box"></div><h4>等待活动...</h4></div></div>
  </div>
  <div class="panel" id="archive-panel" style="display:none;flex:1">
    <div class="panel-header">已归档任务</div>
    <div class="panel-body">
      <div class="archive-wrap">
        <input class="archive-search" type="text" placeholder="搜索归档..." id="arc-search" oninput="filterArchive()">
        <div id="archive-list"><div class="empty-state"><div class="empty-box"></div><h4>加载中...</h4></div></div>
      </div>
    </div>
  </div>
</div>

<div id="file-col">
  <div class="file-nav-panel">
    <div class="file-nav-header">工作区文件</div>
    <div id="file-nav-items"></div>
  </div>
  <div class="file-preview-panel">
    <div class="file-preview-header" id="preview-title">选择文件查看</div>
    <div class="file-preview-body" id="preview-body"></div>
  </div>
</div>

</div>

<script>
var API='/api/plug/task_scaffold/api';
let ST={current:null,archives:[],activeCat:'all',files:{},_cacheAct:'',_cacheCur:'',_lastActive:null},_rendered=new Set();

async function get(path){
  if(typeof E!=='undefined'&&API==='__EMBEDDED__'){
    if(path==='/current')return E.current;
    if(path==='/archives')return E.archives;
    if(path==='/activity')return E.activity||[];
    return{};
  }
  try{
    const r=await fetch(API+path);
    if(!r.ok){console.warn('API '+path+' → '+r.status);return path==='/current'?{active:!1}:path==='/activity'||path==='/archives'?[]:null;}
    const t=await r.text();
    try{return JSON.parse(t);}
    catch(e){console.warn('JSON parse failed '+path,t.slice(0,60));return path==='/current'?{active:!1}:path==='/activity'||path==='/archives'?[]:null;}
  }catch(e){console.warn('Fetch '+path,e);return path==='/current'?{active:!1}:path==='/activity'||path==='/archives'?[]:null;}
}
async function getText(path){if(typeof E!=='undefined'&&API==='__EMBEDDED__')return '(离线)';try{const r=await fetch(API+path);return r.text();}catch(e){return '(无法加载)'};}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function ts(){if(typeof E!=='undefined'&&API==='__EMBEDDED__')return '离线快照';const t=new Date();return t.toTimeString().slice(0,8);}

function switchView(v){
  const cur=v==='current';
  document.getElementById('nav-current').classList.toggle('active',cur);
  document.getElementById('nav-archive').classList.toggle('active',!cur);
  const tp=document.getElementById('task-panel');
  const lp=document.getElementById('live-panel');
  const ap=document.getElementById('archive-panel');
  if(cur){tp.style.display='flex';lp.style.display='flex';ap.style.display='none';tp.classList.add('fade')}
  else{ap.style.display='flex';tp.style.display='none';lp.style.display='none';ap.classList.add('fade')}
  setTimeout(()=>{tp.classList.remove('fade');ap.classList.remove('fade')},300);
  if(!cur) loadArchives();
}

function _skelTask(){
  return '<div class="skel-hero"><div><div class="skeleton skel-bar" style="width:140px"></div><div class="skeleton skel-bar" style="width:90px;margin-top:6px"></div></div><div class="skeleton skel-circle"></div></div>'+Array(7).fill('<div class="skeleton skel-bar" style="margin:6px 22px;height:18px"></div>').join('');
}

function _skelArchive(){return Array(2).fill('<div style="padding:8px 18px"><div class="skeleton skel-bar" style="width:80px;margin-bottom:6px"></div>'+Array(3).fill('<div class="skeleton skel-bar" style="height:28px;margin-bottom:3px"></div>').join('')+'</div>').join('');}

let _rafId=0;

function _animPct(el,tgt){cancelAnimationFrame(_rafId);let cur=0;const step=()=>{cur=Math.min(cur+Math.ceil((tgt-cur)/6),tgt);el.textContent=cur+'%';if(cur<tgt)_rafId=requestAnimationFrame(step)};step()}

async function loadCurrent(){
  cancelAnimationFrame(_rafId);
  let cur;
  try{cur=await get('/current');}catch(e){console.error('loadCurrent failed',e);return;}
  if(!cur||!cur.active){
    if(cur===null) console.warn('loadCurrent: get("/current") returned null');
    if(ST._lastActive){
      cur=ST._lastActive; cur._stale=true;
    }else{
      const tbody=document.getElementById('task-body');
      const thead=document.getElementById('task-header');
      thead.textContent='当前任务';
      tbody.innerHTML='<div class="empty-state"><div class="empty-house"></div><h4>无活跃任务</h4><p>对 Agent 说要做什么即可</p></div>';
      document.getElementById('file-nav-items').innerHTML='';
      document.getElementById('preview-body').textContent='';
      return;
    }
  }
  if(!cur._stale){
    const curStr=JSON.stringify(cur);
    if(curStr===ST._cacheCur)return;
    ST._cacheCur=curStr;
  }
  ST.current=cur;
  ST._lastActive=cur._stale?ST._lastActive:cur;
  const tbody=document.getElementById('task-body');
  const thead=document.getElementById('task-header');
  tbody.innerHTML=_skelTask();
  const td=ST.current.todos||[]; const n=td.length;
  const comp=ST.current.completed||0; const pct=n?Math.round(comp/n*100):0;
  const ip=td.find(t=>t.status==='in_progress');
  const slug=ST.current.slug||'';
  const taskTitle=ST.current.title||(td[0]?td[0].content:'');
  thead.textContent='当前任务 · '+slug;
  if(ST.current._stale) thead.textContent+=' (已归档)';
  let h='<div class="task-hero">';
  h+='<div class="task-hero-title">'+esc(taskTitle.slice(0,60))+'</div>';
  h+='<div class="task-hero-meta">'+(n)+' 项任务</div>';
  h+='<div class="task-hero-tags">';
  (ST.current.tags||[]).forEach(t=>{h+='<span class="task-hero-tag">'+esc(t)+'</span>'});
  h+='</div></div>';
  const dash=((100-pct)/100*2*Math.PI*28).toFixed(1);
  h+='<div class="progress-row"><div class="progress-ring"><svg viewBox="0 0 64 64"><circle class="bg" cx="32" cy="32" r="28"/><circle class="fill" cx="32" cy="32" r="28" stroke-dasharray="175.93" stroke-dashoffset="'+dash+'"/></svg><span class="pct anim" id="pct-val">0%</span></div>';
  h+='<div class="progress-stats">';
  if(ip) h+='<div class="progress-stat"><span class="progress-dot active"></span> 进行中 <b>#'+(td.indexOf(ip)+1)+' '+esc(ip.content.slice(0,30))+'</b></div>';
  h+='<div class="progress-stat"><span class="progress-dot done"></span> 已完成 <b>'+comp+' 项</b></div>';
  h+='<div class="progress-stat"><span class="progress-dot waiting"></span> 待办 <b>'+(n-comp)+' 项</b></div>';
  h+='</div></div><div class="todo-list">';
  td.forEach((t,i)=>{
    const s=t.status==='completed'?'done':t.status==='cancelled'?'cancelled':t.status==='in_progress'?'active':'waiting';
    h+='<div class="todo-item'+(s==='done'||s==='cancelled'?' done':'')+'"><span class="todo-num '+s+'">'+(i+1)+'</span><span class="todo-text'+(s==='done'?' done':s==='cancelled'?' done':'')+'">'+esc(t.content)+'</span><span class="todo-pill '+(t.priority||'medium')+'">'+(t.priority||'medium')+'</span></div>';
  });
  h+='</div>';
  tbody.innerHTML=h;
  setTimeout(()=>{const el=document.getElementById('pct-val');if(el)_animPct(el,pct)},50);
  loadFiles();
}

function loadFiles(){
  const files=['03_work_order.md','02_design.md','01_research.md','00_task_state.json','progress.log'];
  const fi=document.getElementById('file-nav-items');
  let fl='';
  files.forEach(f=>{
    fl+='<div class="file-nav-item" onclick="selectFile(\''+esc(f)+'\')">'+esc(f)+'</div>';
  });
  fi.innerHTML=fl;
  setTimeout(()=>selectFile('03_work_order.md'),100);
}

async function selectFile(name){
  document.querySelectorAll('.file-nav-item').forEach(el=>el.classList.remove('active'));
  const items=document.querySelectorAll('.file-nav-item');
  items.forEach(el=>{if(el.textContent.trim()===name)el.classList.add('active')});
  document.getElementById('preview-title').textContent=name;
  let content='(加载中...)';
  try{content=await getText('/current/file/'+encodeURIComponent(name));}catch(e){content='(无法加载)'}
  const pb=document.getElementById('preview-body');pb.textContent=content.slice(0,5000);pb.classList.add('fade');setTimeout(()=>pb.classList.remove('fade'),250);
}

async function loadArchives(){
  document.getElementById('archive-list').innerHTML=_skelArchive();
  let arcs;
  try{arcs=await get('/archives');}catch(e){return;}
  if(!arcs||!Array.isArray(arcs)){console.warn('loadArchives: non-array',arcs);arcs=[];}
  ST.archives=arcs;
  document.getElementById('archive-badge').textContent=ST.archives.length;
  const tags={};
  ST.archives.forEach(a=>{(a.tags||[]).forEach(t=>{tags[t]=(tags[t]||0)+1})});
  const tc=document.getElementById('tag-cats');
  tc.innerHTML='<div class="nav-item'+(ST.activeCat==='all'?' active':'')+'" style="font-size:12px" onclick="filterArchiveCat(\'all\')">全部</div>';
  Object.entries(tags).sort((a,b)=>b[1]-a[1]).forEach(([tag,n])=>{
    tc.innerHTML+='<div class="nav-item'+(ST.activeCat===tag?' active':'')+'" style="font-size:12px" onclick="filterArchiveCat(\''+esc(tag)+'\')"> '+esc(tag)+' ('+n+')</div>';
  });
  renderArchive();
}

function renderArchive(){
  const kw=(document.getElementById('arc-search')?.value||'').toLowerCase();
  let items=ST.archives;
  if(ST.activeCat!=='all') items=items.filter(a=>(a.tags||[]).includes(ST.activeCat));
  if(kw) items=items.filter(a=>((a.slug||'')+' '+(a.summary||'')+' '+(a.tags||[]).join(' ')).toLowerCase().includes(kw));
  const groups={};
  items.forEach(a=>{
    const m=(a.slug||'').substring(0,7)||'未知';
    if(!groups[m]) groups[m]=[];
    groups[m].push(a);
  });
  let h='';
  Object.keys(groups).sort().reverse().forEach(m=>{
    h+='<div class="arc-group open"><div class="arc-group-head" onclick="this.parentElement.classList.toggle(\'open\')"><div class="arc-group-icon"></div><div><div class="arc-group-name">'+m+'</div><div class="arc-group-count">'+groups[m].length+' 个归档</div></div><span class="arc-group-arr"></span></div>';
    h+='<div class="arc-items">';
    groups[m].forEach(a=>{
      const done=a.completed===a.count;
      h+='<div class="arc-item" onclick="this.classList.toggle(\'open\')"><div class="arc-item-head"><div><div class="arc-item-title">'+esc(a.slug||'')+'</div><div class="arc-item-meta"><span class="arc-item-badge '+(done?'done':'partial')+'">'+(done?' 完成':(a.completed||0)+'/'+(a.count||0))+'</span> · '+(a.completed_at||'').slice(0,10)+'</div></div><span style="color:var(--muted);font-size:9px"></span></div><div class="arc-item-detail">'+esc(a.summary||'')+'</div></div>';
    });
    h+='</div></div>';
  });
  if(!h) h='<div class="empty-state"><div class="empty-box"></div><h4>没有找到匹配的归档</h4></div>';
  document.getElementById('archive-list').innerHTML=h;
}

function filterArchiveCat(cat){
  ST.activeCat=cat;
  document.querySelectorAll('#tag-cats .nav-item').forEach(el=>el.classList.remove('active'));
  const cats=document.querySelectorAll('#tag-cats .nav-item');
  cats.forEach(el=>{const t=el.textContent.trim();if(cat==='all'?t==='全部':t.startsWith(cat+' ('))el.classList.add('active')});
  renderArchive();
}

function filterArchive(){renderArchive();}

async function loadActivity(){
  try{
    const acts=await get('/activity');
    if(!acts||!acts.length) return;
    const actStr=JSON.stringify(acts);
    if(actStr===ST._cacheAct)return;
    ST._cacheAct=actStr;
    const lb=document.getElementById('live-body');
    const fresh=acts.filter(a=>{const key=a.ts+'|'+(a.detail||'');if(_rendered.has(key))return false;_rendered.add(key);return true;});
    if(!fresh.length) return;
    let h='';
    fresh.forEach(a=>{
      const st=(a.status||'');const cls=st==='执行中'?'exec':st==='回复中'?'reply':st==='待命中'?'think':st==='阅读中'?'read':'think';
      h+='<div class="live-row slide-in"><span class="lr-ts">'+(a.ts||'').slice(0,8)+'</span><span class="lr-dot '+cls+'"></span><div class="lr-body"><span class="lr-agent">'+(a.agent||'')+'</span> <span class="lr-detail">'+esc(a.detail||'')+'</span></div></div>';
    });
    if(h) lb.insertAdjacentHTML('afterbegin', h);
    const es = lb.querySelector('.empty-state'); if(es) es.remove();
    if(_rendered.size>500){const arr=[..._rendered];_rendered=new Set(arr.slice(-300));}
  }catch(e){}
}

setInterval(()=>{
  document.getElementById('nav-time').textContent=' · '+ts();
  if(typeof E==='undefined'||API!=='__EMBEDDED__'){loadCurrent();loadActivity();}
},3000);

loadCurrent();
loadArchives();
loadActivity();
</script>
